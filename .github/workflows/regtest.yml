name: Regtest Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger for debugging
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  regtest:
    name: Regtest (L402 end-to-end)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2

      - name: Install protobuf compiler
        run: sudo apt-get install -y protobuf-compiler

      - name: Compile regtest tests (without running)
        run: cargo test -p bolt402-regtest --no-run

      - name: Start Docker services
        working-directory: tests/regtest
        run: docker compose up -d

      - name: Wait for services to be healthy
        working-directory: tests/regtest
        run: |
          echo "Waiting for bitcoind..."
          docker compose exec -T bitcoind bitcoin-cli -regtest -rpcuser=regtest -rpcpassword=regtest -rpcwait getblockchaininfo > /dev/null

          echo "Waiting for lnd-alice..."
          timeout 120 bash -c 'until docker compose exec -T lnd-alice lncli --network=regtest getinfo 2>/dev/null; do sleep 3; done'

          echo "Waiting for lnd-bob..."
          timeout 120 bash -c 'until docker compose exec -T lnd-bob lncli --network=regtest getinfo 2>/dev/null; do sleep 3; done'

          echo "Waiting for cln..."
          timeout 120 bash -c 'until docker compose exec -T cln lightning-cli --network=regtest getinfo 2>/dev/null; do sleep 3; done'

          echo "All services ready."

      - name: Initialize regtest network
        working-directory: tests/regtest
        run: ./scripts/init-regtest.sh

      - name: Wait for Aperture to be ready
        working-directory: tests/regtest
        run: |
          echo "Waiting for Aperture..."
          timeout 60 bash -c 'until wget -q -O- http://localhost:8081/health 2>/dev/null; do sleep 3; done'
          echo "Aperture ready."

      - name: Run regtest integration tests
        run: cargo test -p bolt402-regtest -- --nocapture
        env:
          RUST_LOG: info

      - name: Docker logs (on failure)
        if: failure()
        working-directory: tests/regtest
        run: docker compose logs --tail=100

      - name: Teardown
        if: always()
        working-directory: tests/regtest
        run: docker compose down -v
